<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feira do Luiz | Dico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>FEIRA DO LUIZ | DICO</h1>
    </header>

    <main>
        <!-- Controle de Clientes (Abas Superiores) -->
        <section class="controle-clientes">
            <button id="btn-add-cliente" class="btn-principal">+</button>
            <div id="lista-clientes-abas" class="abas-container">
                <!-- Os nomes dos clientes entram aqui dinamicamente -->
            </div>
        </section>

        <!-- Mensagem amigável caso não tenha cliente selecionado -->
        <div id="msg-sem-cliente" class="aviso-vazio">
            <p>Nenhum cliente ativo. Clique no "+" acima para adicionar um nome e iniciar a conta.</p>
        </div>

        <!-- Container do Cliente Ativo -->
        <section id="area-cliente" class="hidden">
            <div class="cliente-header">
                <h2 id="nome-cliente-display">Cliente: <span></span></h2>
                <div class="acoes-cliente-topo">
                    <button id="btn-editar-cliente" class="btn-secundario">Editar Nome</button>
                    <button id="btn-remover-cliente" class="btn-perigo">Excluir</button>
                </div>
            </div>

            <!-- Busca de Produtos -->
            <div class="busca-container">
                <input type="text" id="input-busca" placeholder="Pesquisar produto...">
                <ul id="lista-sugestoes" class="hidden"></ul>
            </div>

            <!-- Extrato / Conta do Cliente -->
            <div class="conta-container">
                <h3>Itens Consumidos</h3>
                <ul id="lista-consumo">
                    <!-- Itens entram aqui dinamicamente -->
                </ul>
                <div class="total-container">
                    <strong>Total Geral: R$ <span id="total-conta">0.00</span></strong>
                </div>
                
                <!-- Botão de Pagamento Verde -->
                <button id="btn-pago" class="btn-sucesso">Foi Pago</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
